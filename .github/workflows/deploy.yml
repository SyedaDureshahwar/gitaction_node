name: Node CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Stop old server
        run: taskkill /F /IM node.exe
        continue-on-error: true

      - name: Start Node app
        run: start /B npm start