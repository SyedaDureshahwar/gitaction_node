name: Node CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Stop old server
        run: |
          pkill -f node || true

      - name: Start Node app
        run: |
          nohup node index.js > app.log 2>&1 &